<head>

    <title>PDF Merge Tool - Free Online PDF Combiner</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-9312214619729808"
    crossorigin="anonymous"></script>
    <!-- PDF-lib library for actual PDF merging -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        /* Global Styles */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
        }

        header p {
            margin: 10px 0 0;
            font-size: 1.1rem;
            opacity: 0.95;
        }

        main {
            max-width: 800px;
            margin: 30px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /* Upload Section */
        #upload-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .file-input-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .file-input-label {
            padding: 12px 25px;
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }

        #file-names {
            font-size: 0.95rem;
            color: #555;
            flex: 1;
            min-width: 150px;
            word-break: break-all;
        }

        #file-count {
            font-size: 0.9rem;
            color: #666;
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        #merge-btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 300px;
        }

        #merge-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        #merge-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #merge-btn:active {
            transform: translateY(0);
        }

        /* File List */
        #file-list {
            margin: 15px 0;
            padding: 0;
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            display: none;
        }

        #file-list li {
            padding: 10px 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        #file-list li:last-child {
            border-bottom: none;
        }

        #file-list .file-size {
            color: #888;
            font-size: 0.8rem;
        }

        #file-list .remove-file {
            color: #dc3545;
            cursor: pointer;
            font-weight: bold;
            padding: 0 5px;
        }

        #file-list .remove-file:hover {
            color: #c82333;
        }

        /* Result Section */
        #result-section {
            text-align: center;
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #result-section h2 {
            color: #28a745;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        #result-section p {
            color: #666;
            margin-bottom: 20px;
        }

        #download-link {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        #download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #dc3545;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #f0f0f0;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 8px;
            background: linear-gradient(90deg, #dc3545, #28a745);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        /* Ad Section */
        #ad-section-top, #ad-section-bottom {
            margin: 20px auto;
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 90px;
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 1000;
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            header p {
                font-size: 1rem;
            }

            main {
                padding: 20px;
                margin: 15px;
            }

            .file-input-container {
                flex-direction: column;
                align-items: stretch;
            }

            .file-input-label, #merge-btn, #download-link {
                width: 100%;
                padding: 14px;
                text-align: center;
            }

            #file-names {
                text-align: center;
            }

            #merge-btn {
                max-width: 100%;
            }

            #file-count {
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }

            main {
                padding: 15px;
                margin: 10px;
            }

            .file-input-label {
                font-size: 0.9rem;
                padding: 12px;
            }

            #merge-btn {
                font-size: 1rem;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>📄 PDF Merge Tool</h1>
        <p>Combine multiple PDF files into one quickly and easily!</p>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Top Ad Unit - AdMob Unit ID: ca-app-pub-9312214619729808/2493924678 -->
        <section id="ad-section-top">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-app-pub-9312214619729808"
                 data-ad-slot="2493924678"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </section>

        <!-- Upload Section -->
        <section id="upload-section">
            <div class="file-input-container">
                <label for="pdf-input" class="file-input-label">📁 Choose PDF Files</label>
                <span id="file-names">No files chosen</span>
                <span id="file-count"></span>
            </div>
            <input type="file" id="pdf-input" accept=".pdf,application/pdf" multiple style="display: none;">
            
            <!-- File List -->
            <ul id="file-list"></ul>
            
            <button id="merge-btn">🔗 Merge PDFs</button>
            <div class="loader" id="loader"></div>
            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div id="status-message" style="text-align:center; color:#666; font-size:0.9rem; display:none;"></div>
        </section>

        <!-- Result Section -->
        <section id="result-section">
            <h2>✅ Your Merged PDF is Ready!</h2>
            <p>Your PDF files have been successfully merged into one document.</p>
            <a id="download-link" href="#" download="merged-document.pdf">💾 Download Merged PDF</a>
            <br>
            <button id="merge-more-btn" style="margin-top:15px; padding:10px 25px; background:#6c757d; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;">🔄 Merge More Files</button>
        </section>

        <!-- Bottom Ad Unit - AdMob Unit ID: ca-app-pub-9312214619729808/2493924678 -->
        <section id="ad-section-bottom">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-app-pub-9312214619729808"
                 data-ad-slot="2493924678"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 PDF Merge Tool. All rights reserved. | Made with ❤️</p>
    </footer>

    <script>
        // JavaScript Functionality
        const pdfInput = document.getElementById('pdf-input');
        const fileNamesDisplay = document.getElementById('file-names');
        const fileCountDisplay = document.getElementById('file-count');
        const fileList = document.getElementById('file-list');
        const mergeBtn = document.getElementById('merge-btn');
        const resultSection = document.getElementById('result-section');
        const downloadLink = document.getElementById('download-link');
        const loader = document.getElementById('loader');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const mergeMoreBtn = document.getElementById('merge-more-btn');
        const statusMessage = document.getElementById('status-message');

        let selectedFiles = [];

        // Display the chosen file names
        pdfInput.addEventListener('change', function() {
            if (pdfInput.files.length > 0) {
                selectedFiles = Array.from(pdfInput.files);
                updateFileList();
            } else {
                selectedFiles = [];
                fileNamesDisplay.textContent = 'No files chosen';
                fileCountDisplay.textContent = '';
                fileList.style.display = 'none';
                fileList.innerHTML = '';
            }
        });

        // Update file list
        function updateFileList() {
            const fileNames = selectedFiles.map(file => file.name).join(', ');
            fileNamesDisplay.textContent = fileNames.length > 50 ? fileNames.substring(0, 50) + '...' : fileNames;
            fileCountDisplay.textContent = `${selectedFiles.length} file(s) selected`;
            
            // Build file list
            fileList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const li = document.createElement('li');
                const fileSize = (file.size / 1024).toFixed(1);
                li.innerHTML = `
                    <span>📄 ${file.name}</span>
                    <span>
                        <span class="file-size">(${fileSize} KB)</span>
                        <span class="remove-file" data-index="${index}">✕</span>
                    </span>
                `;
                fileList.appendChild(li);
            });
            fileList.style.display = 'block';

            // Add remove functionality
            document.querySelectorAll('.remove-file').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.dataset.index);
                    selectedFiles.splice(index, 1);
                    
                    // Update input files
                    const dataTransfer = new DataTransfer();
                    selectedFiles.forEach(file => dataTransfer.items.add(file));
                    pdfInput.files = dataTransfer.files;
                    
                    updateFileList();
                    if (selectedFiles.length === 0) {
                        fileNamesDisplay.textContent = 'No files chosen';
                        fileCountDisplay.textContent = '';
                        fileList.style.display = 'none';
                    }
                });
            });
        }

        // Merge PDFs using pdf-lib
        mergeBtn.addEventListener('click', async function() {
            if (selectedFiles.length === 0) {
                alert('⚠️ Please select at least one PDF file to merge.');
                return;
            }

            if (selectedFiles.length === 1) {
                alert('ℹ️ Please select at least 2 PDF files to merge.');
                return;
            }

            // Show loader and progress
            loader.style.display = 'block';
            mergeBtn.disabled = true;
            mergeBtn.textContent = '⏳ Merging...';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            resultSection.style.display = 'none';
            statusMessage.style.display = 'block';
            statusMessage.textContent = 'Loading PDF files...';

            try {
                // Check if pdf-lib is loaded
                if (typeof PDFLib === 'undefined') {
                    throw new Error('PDF library not loaded. Please check your internet connection.');
                }

                const { PDFDocument } = PDFLib;
                
                // Create a new PDF document
                const mergedPdf = await PDFDocument.create();
                
                let progress = 0;
                const totalFiles = selectedFiles.length;

                // Process each PDF file
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    statusMessage.textContent = `Processing ${i + 1}/${totalFiles}: ${file.name}`;
                    
                    // Read the file as ArrayBuffer
                    const arrayBuffer = await file.arrayBuffer();
                    
                    try {
                        // Load the PDF
                        const pdf = await PDFDocument.load(arrayBuffer);
                        
                        // Copy all pages from this PDF to the merged PDF
                        const indices = pdf.getPageIndices();
                        const copiedPages = await mergedPdf.copyPages(pdf, indices);
                        
                        // Add each copied page to the merged PDF
                        copiedPages.forEach(page => {
                            mergedPdf.addPage(page);
                        });
                        
                        // Update progress
                        progress = ((i + 1) / totalFiles) * 100;
                        progressBar.style.width = progress + '%';
                        
                    } catch (err) {
                        console.error(`Error processing ${file.name}:`, err);
                        throw new Error(`Failed to process "${file.name}". Please make sure it's a valid PDF file.`);
                    }
                }

                statusMessage.textContent = 'Creating merged PDF...';
                progressBar.style.width = '100%';

                // Save the merged PDF
                const mergedPdfBytes = await mergedPdf.save();
                
                // Create a blob and URL
                const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                const mergedUrl = URL.createObjectURL(blob);

                // Show result section
                resultSection.style.display = 'block';
                downloadLink.href = mergedUrl;
                downloadLink.download = `merged-document-${Date.now()}.pdf`;

                // Hide loader and progress
                loader.style.display = 'none';
                progressContainer.style.display = 'none';
                mergeBtn.disabled = false;
                mergeBtn.textContent = '🔗 Merge PDFs';
                statusMessage.style.display = 'none';
                
                // Scroll to result
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });

            } catch (error) {
                console.error('Merge error:', error);
                alert(`❌ Error merging PDFs: ${error.message}`);
                loader.style.display = 'none';
                progressContainer.style.display = 'none';
                mergeBtn.disabled = false;
                mergeBtn.textContent = '🔗 Merge PDFs';
                statusMessage.style.display = 'none';
            }
        });

        // Merge more files
        mergeMoreBtn.addEventListener('click', function() {
            resultSection.style.display = 'none';
            pdfInput.value = '';
            selectedFiles = [];
            fileNamesDisplay.textContent = 'No files chosen';
            fileCountDisplay.textContent = '';
            fileList.style.display = 'none';
            fileList.innerHTML = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Handle drag and drop
        document.addEventListener('dragover', function(e) {
            e.preventDefault();
        });

        document.addEventListener('drop', function(e) {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const pdfFiles = Array.from(files).filter(file => 
                    file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')
                );
                if (pdfFiles.length > 0) {
                    pdfInput.files = new DataTransfer().files;
                    const dataTransfer = new DataTransfer();
                    pdfFiles.forEach(file => dataTransfer.items.add(file));
                    pdfInput.files = dataTransfer.files;
                    pdfInput.dispatchEvent(new Event('change'));
                } else {
                    alert('⚠️ Please drop PDF files only.');
                }
            }
        });

        // Keyboard shortcut: Enter to merge
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.activeElement === document.body) {
                mergeBtn.click();
            }
        });

        // Log AdMob IDs for verification
        console.log('✅ PDF Merge Tool loaded successfully!');
        console.log('📌 Ad Client ID: ca-app-pub-9312214619729808');
        console.log('📌 Ad Unit ID: ca-app-pub-9312214619729808/2493924678');
        console.log('📌 Account ID: ca-app-pub-9312214619729808~4900138730');
        console.log('📌 PDF-lib library loaded:', typeof PDFLib !== 'undefined');
    </script>
</body>
