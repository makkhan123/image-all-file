<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9312214619729808"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Convert your images online with our fully responsive image converter tool. Convert images to JPG, PNG, WebP, BMP, GIF, TIFF, and more.">
    <meta name="keywords" content="image converter, convert image, JPG, PNG, WebP, BMP, GIF, TIFF, image tool">
    <meta name="author" content="Muhammad Zaid">
    <title>Image Converter Tool - Convert Images Online</title>
    <style>
        /* Global Styles */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
        }

        header p {
            margin: 10px 0 0;
            font-size: 1.1rem;
            opacity: 0.95;
        }

        main {
            max-width: 800px;
            margin: 30px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /* Upload Section */
        #upload-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .file-input-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .file-input-label {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #file-name {
            font-size: 0.95rem;
            color: #555;
            flex: 1;
            min-width: 150px;
            word-break: break-all;
        }

        #file-info {
            font-size: 0.9rem;
            color: #666;
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 20px;
            display: none;
        }

        #format-selection {
            margin: 10px 0;
        }

        #format-selection label {
            font-size: 1rem;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #333;
        }

        #format-selection select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            max-width: 300px;
            background-color: white;
            transition: border-color 0.3s ease;
            cursor: pointer;
        }

        #format-selection select:focus {
            border-color: #667eea;
            outline: none;
        }

        #convert-btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 300px;
        }

        #convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #convert-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #convert-btn:active {
            transform: translateY(0);
        }

        /* Result Section */
        #result-section {
            text-align: center;
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #result-section h2 {
            color: #28a745;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        #result-section p {
            color: #666;
            margin-bottom: 15px;
        }

        #converted-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            margin: 15px 0;
            max-height: 500px;
            object-fit: contain;
        }

        #download-link {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        #download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Ad Section */
        #ad-section-top, #ad-section-bottom {
            margin: 20px auto;
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 90px;
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 1000;
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            header p {
                font-size: 1rem;
            }

            main {
                padding: 20px;
                margin: 15px;
            }

            .file-input-container {
                flex-direction: column;
                align-items: stretch;
            }

            .file-input-label, #convert-btn, #download-link {
                width: 100%;
                padding: 14px;
                text-align: center;
            }

            #format-selection select {
                max-width: 100%;
            }

            #file-name {
                text-align: center;
            }

            #convert-btn {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }

            main {
                padding: 15px;
                margin: 10px;
            }

            .file-input-label {
                font-size: 0.9rem;
                padding: 12px;
            }

            #format-selection select {
                font-size: 0.9rem;
                padding: 10px;
            }

            #convert-btn {
                font-size: 1rem;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🖼️ Image Converter Tool</h1>
        <p>Convert your images to JPG, PNG, WebP, BMP, GIF, TIFF, and more.</p>
    </header>

    <main>
        <!-- Top Ad Unit -->
        <section id="ad-section-top">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-9312214619729808"
                 data-ad-slot="8520276979"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </section>

        <!-- Upload Section -->
        <section id="upload-section">
            <div class="file-input-container">
                <label for="image-input" class="file-input-label">📁 Choose File</label>
                <span id="file-name">No file chosen</span>
                <span id="file-info"></span>
            </div>
            <input type="file" id="image-input" accept="image/*" style="display: none;">
            <div id="format-selection">
                <label for="format-select">🎯 Convert to:</label>
                <select id="format-select">
                    <option value="jpeg">JPG</option>
                    <option value="png">PNG</option>
                    <option value="webp">WebP</option>
                    <option value="bmp">BMP</option>
                    <option value="gif">GIF</option>
                    <option value="tiff">TIFF</option>
                    <option value="ico">ICO</option>
                </select>
            </div>
            <button id="convert-btn">🔄 Convert Image</button>
            <div class="loader" id="loader"></div>
            <div id="status-message" style="text-align:center; color:#666; font-size:0.9rem; display:none;"></div>
        </section>

        <!-- Result Section -->
        <section id="result-section">
            <h2>✅ Conversion Complete!</h2>
            <p>Your image has been successfully converted.</p>
            <img id="converted-image" src="" alt="Converted Image">
            <br>
            <a id="download-link" href="#" download="converted-image">💾 Download Converted Image</a>
            <br>
            <button id="convert-more-btn" style="margin-top:15px; padding:10px 25px; background:#6c757d; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:600;">🔄 Convert More Images</button>
        </section>

        <!-- Bottom Ad Unit -->
        <section id="ad-section-bottom">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-9312214619729808"
                 data-ad-slot="8520276979"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Image Converter Tool. All rights reserved. | Made with ❤️</p>
    </footer>

    <script>
        // JavaScript Functionality
        const imageInput = document.getElementById('image-input');
        const fileNameDisplay = document.getElementById('file-name');
        const fileInfoDisplay = document.getElementById('file-info');
        const formatSelect = document.getElementById('format-select');
        const convertBtn = document.getElementById('convert-btn');
        const resultSection = document.getElementById('result-section');
        const convertedImage = document.getElementById('converted-image');
        const downloadLink = document.getElementById('download-link');
        const loader = document.getElementById('loader');
        const statusMessage = document.getElementById('status-message');
        const convertMoreBtn = document.getElementById('convert-more-btn');

        let currentImageData = null;
        let currentFileName = '';
        let originalFileSize = 0;

        // Display the chosen file name
        imageInput.addEventListener('change', function() {
            if (imageInput.files.length > 0) {
                const file = imageInput.files[0];
                currentFileName = file.name;
                originalFileSize = file.size;
                fileNameDisplay.textContent = `📄 ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
                
                // Get image dimensions
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageData = e.target.result;
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = function() {
                        fileInfoDisplay.textContent = `📐 ${img.width} × ${img.height} pixels`;
                        fileInfoDisplay.style.display = 'inline-block';
                        
                        // Show preview in result section
                        convertedImage.src = e.target.result;
                        resultSection.style.display = 'block';
                        downloadLink.style.display = 'inline-block';
                    };
                };
                reader.readAsDataURL(file);
            } else {
                fileNameDisplay.textContent = 'No file chosen';
                fileInfoDisplay.style.display = 'none';
                currentImageData = null;
            }
        });

        // Convert Image
        convertBtn.addEventListener('click', function() {
            if (!currentImageData) {
                alert('⚠️ Please select an image to convert first.');
                return;
            }

            // Show loader
            loader.style.display = 'block';
            convertBtn.disabled = true;
            convertBtn.textContent = '⏳ Converting...';
            resultSection.style.display = 'none';
            statusMessage.style.display = 'block';
            statusMessage.textContent = 'Processing image...';

            setTimeout(() => {
                try {
                    const img = new Image();
                    img.src = currentImageData;

                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        canvas.width = img.width;
                        canvas.height = img.height;

                        // Draw image with white background for formats that don't support transparency
                        const format = formatSelect.value;
                        if (format === 'jpeg' || format === 'bmp' || format === 'tiff') {
                            ctx.fillStyle = 'white';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }
                        
                        ctx.drawImage(img, 0, 0);

                        // Convert to the selected format
                        const mimeType = `image/${format}`;
                        canvas.toBlob(function(blob) {
                            if (blob) {
                                const convertedUrl = URL.createObjectURL(blob);
                                convertedImage.src = convertedUrl;
                                downloadLink.href = convertedUrl;
                                const ext = format === 'jpeg' ? 'jpg' : format;
                                downloadLink.download = `converted-${Date.now()}.${ext}`;
                                
                                resultSection.style.display = 'block';
                                downloadLink.style.display = 'inline-block';
                                statusMessage.textContent = '✅ Conversion complete!';
                                
                                // Hide loader
                                loader.style.display = 'none';
                                convertBtn.disabled = false;
                                convertBtn.textContent = '🔄 Convert Image';
                                
                                // Scroll to result
                                resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            } else {
                                throw new Error('Conversion failed');
                            }
                        }, mimeType, 0.92);
                    };

                    img.onerror = function() {
                        throw new Error('Failed to load image');
                    };
                } catch (error) {
                    console.error('Conversion error:', error);
                    alert('❌ Error converting image. Please try again.');
                    loader.style.display = 'none';
                    convertBtn.disabled = false;
                    convertBtn.textContent = '🔄 Convert Image';
                    statusMessage.style.display = 'none';
                }
            }, 300);
        });

        // Convert more images
        convertMoreBtn.addEventListener('click', function() {
            resultSection.style.display = 'none';
            imageInput.value = '';
            currentImageData = null;
            fileNameDisplay.textContent = 'No file chosen';
            fileInfoDisplay.style.display = 'none';
            statusMessage.style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Handle drag and drop
        document.addEventListener('dragover', function(e) {
            e.preventDefault();
        });

        document.addEventListener('drop', function(e) {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                imageInput.files = files;
                imageInput.dispatchEvent(new Event('change'));
            } else {
                alert('⚠️ Please drop an image file.');
            }
        });

        // Keyboard shortcut: Enter to convert
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.activeElement === document.body) {
                convertBtn.click();
            }
        });

        // Log AdSense setup for verification
        console.log('✅ Image Converter Tool loaded successfully!');
        console.log('📌 AdSense Client ID: ca-pub-9312214619729808');
        console.log('📌 Ad Unit ID: 8520276979');
    </script>
</body>
</html>
