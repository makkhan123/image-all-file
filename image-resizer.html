    <style>
        /* CSS Styling */
        :root {

        .file-input label {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);

        }

        #file-name {
            display: block;
            margin-top: 10px;

            color: #666;
        }

        #sliderContainer {
            margin: 20px 0;

            max-width: 300px;
        }

        #sliderContainer label {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 10px;

        #resizeSlider {

            background: #ddd;

        #resizeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;

        #resizeSlider::-moz-range-thumb {
            width: 20px;

        }

        #resizeValue {

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;

        }

        .action-buttons button {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: #fff;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
            min-width: 120px;
        }

        .action-buttons button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
        }

        .action-buttons button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #output {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #output img {
            max-width: 100%;
            max-height: 400px;
            height: auto;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            margin-bottom: 20px;
            object-fit: contain;
        }

        #downloadButton {
            display: none;
            background: #28a745;
            color: #fff;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: var(--transition);
        }

        #downloadButton:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        footer {
            background: var(--secondary-color);
            color: #fff;
            text-align: center;
            padding: 15px 0;
            width: 100%;
            margin-top: auto;
            position: fixed;
            bottom: 0;
            z-index: 1000;
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
        }

        #ad-top, #ad-bottom {
            margin: 20px 0;
            text-align: center;
            min-width: 320px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 90px;
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4a90e2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #imageInfo {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #666;
            display: none;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            #tool {
                padding: 20px;
            }

            .action-buttons button {
                min-width: 100px;
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }

            #tool {
                padding: 15px;
            }

            .action-buttons {
                flex-direction: column;
                align-items: center;
            }

            .action-buttons button {
                width: 100%;
                max-width: 200px;
            }
        }

<body>
    <header>
        <h1>📐 Image Resizer Tool</h1>
        <p>Resize and rotate your images easily — 100% free!</p>
    </header>

    <main>

            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-9312214619729808"
                 data-ad-slot="8520276979"

                 data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </section>

        <!-- Image Resizer Tool -->
        <section id="tool">
            <div class="file-input">
                <input type="file" id="imageInput" accept="image/*">
                <label for="imageInput">📁 Choose File</label>
                <span id="file-name">No file chosen</span>
            </div>

            <div id="sliderContainer">
                <label for="resizeSlider">Resize Scale: <span id="resizeValue">50%</span></label>
                <input type="range" id="resizeSlider" min="10" max="200" value="50">
            </div>

            <div class="action-buttons">
                <button id="resizeButton">📐 Resize</button>
                <button id="rotateButton">🔄 Rotate</button>
                <button id="resetButton">↺ Reset</button>
            </div>

            <div class="loader" id="loader"></div>
            
            <div id="output">
                <img id="resizedImage" src="" alt="Your image will appear here">
                <button id="downloadButton">💾 Download Image</button>
            </div>
            
            <div id="imageInfo"></div>
        </section>

        <!-- Bottom Ad Unit -->
        <section id="ad-bottom">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-9312214619729808"
                 data-ad-slot="8520276979"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </section>

    <footer>
        <p>&copy; 2024 Image Resizer Tool. All rights reserved. | Made with ❤️</p>

    <script>
        // JavaScript Functionality
        const resizeSlider = document.getElementById('resizeSlider');
        const resizeValue = document.getElementById('resizeValue');
        const imageInput = document.getElementById('imageInput');
        const fileNameDisplay = document.getElementById('file-name');
        const resizeButton = document.getElementById('resizeButton');
        const rotateButton = document.getElementById('rotateButton');
        const resetButton = document.getElementById('resetButton');
        const output = document.getElementById('output');
        const resizedImage = document.getElementById('resizedImage');
        const downloadButton = document.getElementById('downloadButton');
        const loader = document.getElementById('loader');
        const imageInfo = document.getElementById('imageInfo');

        let currentImage = null;
        let originalImageData = null;
        let rotationAngle = 0;
        let currentScale = 0.5;
        let originalFileName = '';

        // Update slider value display
        resizeSlider.addEventListener('input', function() {
            resizeValue.textContent = `${resizeSlider.value}%`;
            currentScale = resizeSlider.value / 100;
        });

        // Handle image upload
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Check if file is an image
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file.');
                return;
            }

            originalFileName = file.name;
            fileNameDisplay.textContent = `📄 ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;

            const reader = new FileReader();

            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    originalImageData = e.target.result;
                    rotationAngle = 0;
                    
                    // Display the image
                    resizedImage.src = e.target.result;
                    output.style.display = 'block';
                    downloadButton.style.display = 'none';
                    
                    // Show image info
                    imageInfo.textContent = `📸 ${file.name} | ${img.width} × ${img.height} pixels`;
                    imageInfo.style.display = 'block';
                    
                    // Reset slider to 50%
                    resizeSlider.value = 50;
                    resizeValue.textContent = '50%';
                    currentScale = 0.5;
                };
                img.src = e.target.result;
            };

            reader.onerror = function() {
                alert('Error reading file. Please try again.');
            };

            reader.readAsDataURL(file);
        });

        // Resize Image
        resizeButton.addEventListener('click', function() {
            if (!currentImage) {
                alert('Please select an image file first.');
                return;
            }

            // Show loader
            loader.style.display = 'block';
            resizeButton.disabled = true;
            output.style.display = 'none';

            setTimeout(() => {
                try {
                    const scale = currentScale;
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // Get original dimensions
                    const originalW = currentImage.width;
                    const originalH = currentImage.height;
                    
                    let displayW, displayH;
                    if (rotationAngle === 90 || rotationAngle === 270) {
                        displayW = originalH;
                        displayH = originalW;
                    } else {
                        displayW = originalW;
                        displayH = originalH;
                    }
                    
                    const finalW = Math.round(displayW * scale);
                    const finalH = Math.round(displayH * scale);
                    
                    canvas.width = finalW;
                    canvas.height = finalH;
                    
                    // Clear canvas
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Apply rotation
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate((rotationAngle * Math.PI) / 180);
                    
                    // Draw image centered and scaled
                    ctx.drawImage(currentImage, -canvas.width/2, -canvas.height/2, canvas.width, canvas.height);

                    const resizedImageData = canvas.toDataURL('image/jpeg', 0.92);
                    resizedImage.src = resizedImageData;

                    // Hide loader and show output
                    loader.style.display = 'none';
                    resizeButton.disabled = false;
                    output.style.display = 'block';
                    downloadButton.style.display = 'block';
                    
                    // Update download button
                    downloadButton.onclick = function() {
                        const link = document.createElement('a');
                        link.href = resizedImageData;
                        const fileName = originalFileName.split('.')[0] || 'image';
                        link.download = `${fileName}-resized.jpg`;
                        link.click();
                    };
                    
                    // Update image info
                    imageInfo.textContent = `📐 Resized: ${finalW} × ${finalH} pixels`;
                } catch (error) {
                    console.error('Resize error:', error);
                    alert('Error resizing image. Please try again.');
                    loader.style.display = 'none';
                    resizeButton.disabled = false;
                    output.style.display = 'block';
                }
            }, 100);
        });

        // Rotate Image
        rotateButton.addEventListener('click', function() {
            if (!currentImage) {
                alert('Please select an image file first.');
                return;
            }

            // Show loader
            loader.style.display = 'block';
            rotateButton.disabled = true;
            output.style.display = 'none';

            setTimeout(() => {
                try {
                    rotationAngle = (rotationAngle + 90) % 360;

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    let width, height;
                    if (rotationAngle === 90 || rotationAngle === 270) {
                        width = currentImage.height;
                        height = currentImage.width;
                    } else {
                        width = currentImage.width;
                        height = currentImage.height;
                    }

                    canvas.width = width;
                    canvas.height = height;

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate((rotationAngle * Math.PI) / 180);
                    ctx.drawImage(currentImage, -currentImage.width / 2, -currentImage.height / 2);

                    const rotatedImageData = canvas.toDataURL('image/jpeg', 0.92);
                    resizedImage.src = rotatedImageData;

                    // Hide loader and show output
                    loader.style.display = 'none';
                    rotateButton.disabled = false;
                    output.style.display = 'block';
                    downloadButton.style.display = 'block';
                    
                    // Update download button
                    downloadButton.onclick = function() {
                        const link = document.createElement('a');
                        link.href = rotatedImageData;
                        const fileName = originalFileName.split('.')[0] || 'image';
                        link.download = `${fileName}-rotated.jpg`;
                        link.click();
                    };
                    
                    // Update image info
                    const angleText = rotationAngle === 0 ? '0°' : `${rotationAngle}°`;
                    imageInfo.textContent = `🔄 Rotated: ${angleText}`;
                } catch (error) {
                    console.error('Rotate error:', error);
                    alert('Error rotating image. Please try again.');
                    loader.style.display = 'none';
                    rotateButton.disabled = false;
                    output.style.display = 'block';
                }
            }, 100);
        });

        // Reset Image
        resetButton.addEventListener('click', function() {
            if (!originalImageData) {
                alert('Please select an image file first.');
                return;
            }

            // Reset rotation and display original
            rotationAngle = 0;
            resizeSlider.value = 50;
            resizeValue.textContent = '50%';
            currentScale = 0.5;
            
            resizedImage.src = originalImageData;
            output.style.display = 'block';
            downloadButton.style.display = 'none';
            
            // Update image info
            if (currentImage) {
                imageInfo.textContent = `↺ Reset: ${currentImage.width} × ${currentImage.height} pixels`;
            }
        });

        // Handle drag and drop
        document.addEventListener('dragover', function(e) {
            e.preventDefault();
        });

        document.addEventListener('drop', function(e) {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                imageInput.files = files;
                imageInput.dispatchEvent(new Event('change'));
            } else {
                alert('⚠️ Please drop an image file.');
            }
        });

        // Keyboard shortcut: Enter to resize
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.activeElement === document.body) {
                resizeButton.click();
            }
        });

        // Log AdSense setup for verification
        console.log('✅ Image Resizer Tool loaded successfully!');
        console.log('📌 AdSense Client ID: ca-pub-9312214619729808');
        console.log('📌 Ad Unit ID: 8520276979');
    </script>
